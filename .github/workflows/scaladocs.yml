name: Scaladocs

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  scaladoc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Install SBT (via Coursier)
        uses: coursier/setup-action@v1
        with:
          apps: sbt

      - name: Cache Ivy2 and Coursier (optional)
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.cache/coursier
            ~/.sbt
          key: sbt-${{ runner.os }}-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}
          restore-keys: |
            sbt-${{ runner.os }}-

      - name: Generate Scaladoc
        run: sbt doc

      - name: Upload Scaladoc
        uses: actions/upload-artifact@v4
        with:
          name: sparkling-scaladoc
          path: target/scala-*/api
          if-no-files-found: error
